<!doctype html><meta charset="utf-8"><title>Rohi Admin</title><style>body{font:16px Arial;max-width:1100px;margin:30px auto;background:#f5f7fb;color:#172033}h1{color:#194b8f}.card{background:white;padding:18px;margin:12px 0;border-radius:10px;box-shadow:0 2px 8px #ccd}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #ddd;text-align:left}.pill{color:#a60}</style><h1>Rohi Admin Dashboard</h1><p>Requests refresh automatically.</p><div id="app">Loading…</div><script>async function load(){let d=await fetch('/api/requests').then(x=>x.json());let html='';for(let [k,v] of Object.entries(d)){html+=`<section class=card><h2>${k} (${v.length})</h2><table><tr><th>Request</th><th>User</th><th>Details</th><th>Status</th></tr>${v.map(x=>`<tr><td>${x.requestNo}</td><td>${x.user?.username||x.user?.telegramId}</td><td>${x.gameName||x.amount||''}</td><td class=pill>${x.status}</td></tr>`).join('')}</table></section>`}document.querySelector('#app').innerHTML=html}load();setInterval(load,10000)</script>
